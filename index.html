<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Famunite Auth</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      background: linear-gradient(
        135deg,
        #0f172a,
        #1e3a8a,
        #2563eb,
        #38bdf8
      );
      background-size:400% 400%;
      animation: gradientMove 12s ease infinite;
      padding:40px;
    }

    @keyframes gradientMove{

      0%{
        background-position:0% 50%;
      }

      50%{
        background-position:100% 50%;
      }

      100%{
        background-position:0% 50%;
      }

    }

    .main-title{
      text-align:center;
      color:white;
      margin-bottom:50px;
    }

    .main-title h1{
      font-size:42px;
      margin-bottom:10px;
    }

    .main-title span{
      color:#38bdf8;
    }

    .main-title p{
      color:rgba(255,255,255,0.8);
    }

    .container{
      width:100%;
      max-width:1300px;
      margin:auto;
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(340px,1fr));
      gap:35px;
    }

    .card{
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:25px;
      padding:35px;
      box-shadow:0 10px 40px rgba(0,0,0,0.35);
      animation: fadeIn 1s ease;
      transition:0.4s;
    }

    .card:hover{
      transform:translateY(-8px);
      box-shadow:0 20px 45px rgba(0,0,0,0.45);
    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    h2{
      color:white;
      margin-bottom:25px;
      font-size:24px;
      position:relative;
      padding-bottom:10px;
    }

    h2::after{
      content:'';
      position:absolute;
      left:0;
      bottom:0;
      width:60px;
      height:4px;
      border-radius:10px;
      background:#38bdf8;
    }

    .input-group{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    input{
      width:100%;
      padding:15px 18px;
      border:none;
      outline:none;
      border-radius:14px;
      background: rgba(255,255,255,0.15);
      color:white;
      font-size:15px;
      transition:0.3s;
      border:1px solid transparent;
    }

    input::placeholder{
      color:rgba(255,255,255,0.7);
    }

    input:focus{
      border:1px solid #38bdf8;
      background: rgba(255,255,255,0.2);
      transform:scale(1.02);
      box-shadow:0 0 15px rgba(56,189,248,0.4);
    }

    button{
      width:100%;
      margin-top:10px;
      padding:15px;
      border:none;
      border-radius:14px;
      background: linear-gradient(
        135deg,
        #06b6d4,
        #2563eb
      );
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 8px 20px rgba(37,99,235,0.35);
    }

    button:hover{
      transform:translateY(-3px);
      box-shadow:0 12px 25px rgba(37,99,235,0.5);
    }

    #user-section{
      display:none;
      max-width:1300px;
      margin:auto;
    }

    .profile-box{
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-top:25px;
    }

    .profile-item{
      background: rgba(255,255,255,0.08);
      padding:20px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.1);
      transition:0.3s;
    }

    .profile-item:hover{
      transform:translateY(-5px);
      background: rgba(255,255,255,0.12);
    }

    .profile-item h3{
      color:#38bdf8;
      font-size:15px;
      margin-bottom:10px;
    }

    .profile-item p{
      color:white;
      font-size:16px;
      word-break:break-word;
    }

    @media(max-width:768px){

      body{
        padding:20px;
      }

      .main-title h1{
        font-size:30px;
      }

    }

  </style>

</head>

<body>

  <!-- TITLE -->

  <div class="main-title">

    <h1>
      Famunite <span>Healthcare</span>
    </h1>

    <p>
      Authentication & Verification Portal
    </p>

  </div>



  <!-- AUTH SECTION -->

  <div class="container" id="auth-container">

    <!-- REGISTER -->

    <div class="card">

      <h2>Register</h2>

      <div class="input-group">

        <input
          id="first_name"
          type="text"
          placeholder="First Name"
        >

        <input
          id="last_name"
          type="text"
          placeholder="Last Name"
        >

        <input
          id="DOB"
          type="date"
        >

        <input
          id="email"
          type="email"
          placeholder="Email"
        >

        <input
          id="phone"
          type="text"
          placeholder="Phone Number"
        >

        <input
          id="password"
          type="password"
          placeholder="Password"
        >

        <button onclick="register()">
          Register
        </button>

      </div>

    </div>



    <!-- VERIFY OTP -->

    <div class="card">

      <h2>Verify OTP</h2>

      <div class="input-group">

        <input
          id="otp_email"
          type="email"
          placeholder="Email"
        >

        <input
          id="otp"
          type="text"
          placeholder="Enter OTP"
        >

        <button onclick="verifyOtp()">
          Verify OTP
        </button>

      </div>

    </div>



    <!-- LOGIN -->

    <div class="card">

      <h2>Login</h2>

      <div class="input-group">

        <input
          id="login_email"
          type="email"
          placeholder="Email"
        >

        <input
          id="login_password"
          type="password"
          placeholder="Password"
        >

        <button onclick="login()">
          Login
        </button>

      </div>

    </div>

  </div>



  <!-- USER DETAILS -->

  <div
    class="card"
    id="user-section"
  >

    <h2>User Details</h2>

    <div class="profile-box">

      <div class="profile-item">
        <h3>First Name</h3>
        <p id="user_first_name">-</p>
      </div>

      <div class="profile-item">
        <h3>Last Name</h3>
        <p id="user_last_name">-</p>
      </div>

      <div class="profile-item">
        <h3>Email</h3>
        <p id="user_email">-</p>
      </div>

      <div class="profile-item">
        <h3>Phone Number</h3>
        <p id="user_phone">-</p>
      </div>

      <div class="profile-item">
        <h3>Date of Birth</h3>
        <p id="user_dob">-</p>
      </div>

      <div class="profile-item">
        <h3>Gender</h3>
        <p id="user_gender">-</p>
      </div>

      <div class="profile-item">
        <h3>Role</h3>
        <p id="user_role">-</p>
      </div>

    </div>

    <br><br>

    <button onclick="logout()">
      Logout
    </button>

  </div>

  <script src="app.js"></script>

</body>
</html>

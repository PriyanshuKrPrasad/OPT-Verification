<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Famunite Healthcare</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(
        135deg,
        #0f172a,
        #1e3a8a,
        #2563eb,
        #38bdf8
      );
      background-size:400% 400%;
      animation:gradientMove 10s ease infinite;
      padding:40px;
    }

    @keyframes gradientMove{

      0%{
        background-position:0% 50%;
      }

      50%{
        background-position:100% 50%;
      }

      100%{
        background-position:0% 50%;
      }

    }

    .main-title{
      text-align:center;
      color:white;
      margin-bottom:40px;
    }

    .main-title h1{
      font-size:42px;
      margin-bottom:10px;
    }

    .main-title span{
      color:#38bdf8;
    }

    .container{
      width:100%;
      max-width:500px;
      margin:auto;
    }

    .card{
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(18px);
      border-radius:25px;
      padding:35px;
      border:1px solid rgba(255,255,255,0.2);
      box-shadow:0 10px 40px rgba(0,0,0,0.35);
      animation:fadeIn 0.7s ease;
    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    h2{
      color:white;
      margin-bottom:25px;
    }

    .input-group{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    input{
      padding:15px;
      border:none;
      outline:none;
      border-radius:14px;
      background:rgba(255,255,255,0.15);
      color:white;
      font-size:15px;
    }

    input::placeholder{
      color:rgba(255,255,255,0.7);
    }

    button{
      padding:15px;
      border:none;
      border-radius:14px;
      background:linear-gradient(
        135deg,
        #06b6d4,
        #2563eb
      );
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:translateY(-3px);
    }

    .link-btn{
      background:none;
      border:none;
      color:#38bdf8;
      margin-top:10px;
      cursor:pointer;
    }

    #otp-section,
    #login-section,
    #forgot-section,
    #reset-section,
    #user-section{
      display:none;
    }

    .profile-box{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
      margin-top:20px;
    }

    .profile-item{
      background:rgba(255,255,255,0.08);
      padding:15px;
      border-radius:15px;
    }

    .profile-item h3{
      color:#38bdf8;
      margin-bottom:8px;
      font-size:14px;
    }

    .profile-item p{
      color:white;
      font-size:15px;
    }

  </style>

</head>

<body>

  <div class="main-title">

    <h1>
      Famunite <span>Healthcare</span>
    </h1>

    <p style="color:white;">
      Authentication Portal
    </p>

  </div>

  <div class="container">

    <!-- REGISTER -->

    <div
      class="card"
      id="register-section"
    >

      <h2>Register</h2>

      <div class="input-group">

        <input
          id="first_name"
          type="text"
          placeholder="First Name"
        >

        <input
          id="last_name"
          type="text"
          placeholder="Last Name"
        >

        <input
          id="DOB"
          type="date"
        >

        <input
          id="email"
          type="email"
          placeholder="Email"
        >

        <input
          id="phone"
          type="text"
          placeholder="Phone Number"
        >

        <input
          id="password"
          type="password"
          placeholder="Password"
        >

        <button onclick="register()">
          Register
        </button>

      </div>

    </div>



    <!-- OTP -->

    <div
      class="card"
      id="otp-section"
    >

      <h2>Verify OTP</h2>

      <div class="input-group">

        <input
          id="otp_email"
          type="email"
          placeholder="Email"
        >

        <input
          id="otp"
          type="text"
          placeholder="Enter OTP"
        >

        <button onclick="verifyOtp()">
          Verify OTP
        </button>

        <button onclick="resendOtp()">
          Resend OTP
        </button>

      </div>

    </div>



    <!-- LOGIN -->

    <div
      class="card"
      id="login-section"
    >

      <h2>Login</h2>

      <div class="input-group">

        <input
          id="login_email"
          type="email"
          placeholder="Email"
        >

        <input
          id="login_password"
          type="password"
          placeholder="Password"
        >

        <button onclick="login()">
          Login
        </button>

        <button
          class="link-btn"
          onclick="showForgotPassword()"
        >
          Forgot Password?
        </button>

      </div>

    </div>



    <!-- FORGOT PASSWORD -->

    <div
      class="card"
      id="forgot-section"
    >

      <h2>Forgot Password</h2>

      <div class="input-group">

        <input
          id="forgot_email"
          type="email"
          placeholder="Enter Email"
        >

        <button onclick="forgotPassword()">
          Send OTP
        </button>

      </div>

    </div>



    <!-- RESET PASSWORD -->

    <div
      class="card"
      id="reset-section"
    >

      <h2>Reset Password</h2>

      <div class="input-group">

        <input
          id="reset_email"
          type="email"
          placeholder="Email"
        >

        <input
          id="reset_otp"
          type="text"
          placeholder="OTP"
        >

        <input
          id="new_password"
          type="password"
          placeholder="New Password"
        >

        <input
          id="confirm_new_password"
          type="password"
          placeholder="Confirm Password"
        >

        <button onclick="resetPassword()">
          Reset Password
        </button>

      </div>

    </div>



    <!-- USER DETAILS -->

    <div
      class="card"
      id="user-section"
    >

      <h2>User Details</h2>

      <div class="profile-box">

        <div class="profile-item">
          <h3>First Name</h3>
          <p id="user_first_name">-</p>
        </div>

        <div class="profile-item">
          <h3>Last Name</h3>
          <p id="user_last_name">-</p>
        </div>

        <div class="profile-item">
          <h3>Email</h3>
          <p id="user_email">-</p>
        </div>

        <div class="profile-item">
          <h3>Phone</h3>
          <p id="user_phone">-</p>
        </div>

        <div class="profile-item">
          <h3>DOB</h3>
          <p id="user_dob">-</p>
        </div>

        <div class="profile-item">
          <h3>Role</h3>
          <p id="user_role">-</p>
        </div>

      </div>

      <br>

      <button onclick="logout()">
        Logout
      </button>

    </div>

  </div>

  <script src="app.js"></script>

</body>

</html>

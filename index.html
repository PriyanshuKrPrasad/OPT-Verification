<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Famunite Auth</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(
        135deg,
        #0f172a,
        #1e3a8a,
        #2563eb,
        #38bdf8
      );
      background-size:400% 400%;
      animation: gradientMove 12s ease infinite;
      padding:40px;
    }

    @keyframes gradientMove{
      0%{
        background-position:0% 50%;
      }
      50%{
        background-position:100% 50%;
      }
      100%{
        background-position:0% 50%;
      }
    }

    .container{
      width:100%;
      max-width:1200px;
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(320px,1fr));
      gap:35px;
    }

    .card{
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:25px;
      padding:35px;
      box-shadow:0 10px 40px rgba(0,0,0,0.35);
      animation: fadeIn 1s ease;
      transition:0.4s;
    }

    .card:hover{
      transform:translateY(-8px);
      box-shadow:0 20px 45px rgba(0,0,0,0.45);
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .title{
      text-align:center;
      color:white;
      margin-bottom:40px;
      grid-column:1/-1;
    }

    .title h1{
      font-size:42px;
      margin-bottom:10px;
      letter-spacing:1px;
    }

    .title span{
      color:#38bdf8;
    }

    .title p{
      color:rgba(255,255,255,0.8);
      font-size:16px;
    }

    h2{
      color:white;
      margin-bottom:25px;
      font-size:24px;
      position:relative;
      padding-bottom:10px;
    }

    h2::after{
      content:'';
      position:absolute;
      left:0;
      bottom:0;
      width:60px;
      height:4px;
      border-radius:10px;
      background:#38bdf8;
    }

    .input-group{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    input{
      width:100%;
      padding:15px 18px;
      border:none;
      outline:none;
      border-radius:14px;
      background: rgba(255,255,255,0.15);
      color:white;
      font-size:15px;
      transition:0.3s;
      border:1px solid transparent;
    }

    input::placeholder{
      color:rgba(255,255,255,0.7);
    }

    input:focus{
      border:1px solid #38bdf8;
      background: rgba(255,255,255,0.2);
      transform:scale(1.02);
      box-shadow:0 0 15px rgba(56,189,248,0.4);
    }

    button{
      width:100%;
      margin-top:10px;
      padding:15px;
      border:none;
      border-radius:14px;
      background: linear-gradient(
        135deg,
        #06b6d4,
        #2563eb
      );
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 8px 20px rgba(37,99,235,0.35);
    }

    button:hover{
      transform:translateY(-3px);
      box-shadow:0 12px 25px rgba(37,99,235,0.5);
    }

    button:active{
      transform:scale(0.98);
    }

    @media(max-width:768px){

      .container{
        grid-template-columns:1fr;
      }

      .title h1{
        font-size:32px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <!-- ========================= -->
    <!-- TITLE -->
    <!-- ========================= -->

    <div class="title">
      <h1>Famunite <span>Healthcare</span></h1>
      <p>Authentication & Verification Portal</p>
    </div>


    <!-- ========================= -->
    <!-- REGISTER -->
    <!-- ========================= -->

    <div class="card">

      <h2>Register</h2>

      <div class="input-group">

        <input
          id="first_name"
          type="text"
          placeholder="First Name"
        >

        <input
          id="last_name"
          type="text"
          placeholder="Last Name"
        >

        <input
          id="DOB"
          type="date"
        >

        <input
          id="email"
          type="email"
          placeholder="Email"
        >

        <input
          id="phone"
          type="text"
          placeholder="Phone Number"
        >

        <input
          id="password"
          type="password"
          placeholder="Password"
        >

        <button onclick="register()">
          Register
        </button>

      </div>

    </div>


    <!-- ========================= -->
    <!-- VERIFY OTP -->
    <!-- ========================= -->

    <div class="card">

      <h2>Verify OTP</h2>

      <div class="input-group">

        <input
          id="otp_email"
          type="email"
          placeholder="Email"
        >

        <input
          id="otp"
          type="text"
          placeholder="Enter OTP"
        >

        <button onclick="verifyOtp()">
          Verify OTP
        </button>

      </div>

    </div>


    <!-- ========================= -->
    <!-- LOGIN -->
    <!-- ========================= -->

    <div class="card">

      <h2>Login</h2>

      <div class="input-group">

        <input
          id="login_email"
          type="email"
          placeholder="Email"
        >

        <input
          id="login_password"
          type="password"
          placeholder="Password"
        >

        <button onclick="login()">
          Login
        </button>

      </div>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
